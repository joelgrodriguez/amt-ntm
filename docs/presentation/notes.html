<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Presenter notes — NTM rebuild</title>
<style>
  :root{
    --paper:#faf9f7; --ink:#1c2530; --muted:#6b7785; --faint:#97a2ad;
    --line:#e3e0db; --rule:#c9c4bc;
    --red:#bf2532; --green:#2f8f5b; --blue:#2c6fb0;
    --tag-bg:#eef0f2;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    font-family:var(--sans); background:var(--paper); color:var(--ink);
    line-height:1.5; -webkit-font-smoothing:antialiased;
    padding:2.4rem 1.4rem 6rem;
  }
  .wrap{ max-width:46rem; margin:0 auto; }

  /* page intro */
  .intro{ border-bottom:2px solid var(--ink); padding-bottom:1.1rem; margin-bottom:2.4rem; }
  .intro h1{ font-size:1.15rem; letter-spacing:-.01em; }
  .intro p{ color:var(--muted); font-size:.9rem; margin-top:.4rem; }
  .intro .keys{ font-family:var(--mono); font-size:.72rem; color:var(--faint);
    margin-top:.7rem; letter-spacing:.02em; }

  /* one note block */
  .note{ padding:1.8rem 0; border-top:1px solid var(--line); }
  .note:first-of-type{ border-top:0; padding-top:0; }

  .note .num{ font-family:var(--mono); font-size:.72rem; color:var(--faint);
    letter-spacing:.14em; }
  .note .head{ font-family:var(--mono); font-size:.74rem; letter-spacing:.08em;
    text-transform:uppercase; color:var(--muted); margin-top:.25rem; }
  .note .screen{ font-size:1.18rem; font-weight:650; letter-spacing:-.01em;
    margin-top:.5rem; text-wrap:balance; }

  /* stay / go / back tag */
  .tag{ display:inline-block; font-family:var(--mono); font-size:.66rem;
    font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    padding:.28rem .55rem; margin-top:.85rem; border:1px solid; }
  .tag.stay{ color:var(--green); border-color:var(--green); }
  .tag.go{   color:var(--red);   border-color:var(--red);   }
  .tag.back{ color:var(--blue);  border-color:var(--blue);  }

  ul{ list-style:none; margin-top:1.05rem; display:flex; flex-direction:column; gap:.7rem; }
  li{ position:relative; padding-left:1.05rem; font-size:1rem; line-height:1.5; }
  li::before{ content:""; position:absolute; left:0; top:.62em;
    width:.34rem; height:.34rem; background:var(--red); }

  li.dim{ color:var(--muted); font-size:.9rem; }
  li.dim::before{ background:var(--faint); }

  li.quote{ font-style:italic; font-size:1.02rem; padding-left:1.1rem;
    border-left:3px solid var(--rule); margin-left:-1.1rem; }
  li.quote::before{ display:none; }

  li.cue{ font-family:var(--mono); font-size:.82rem; line-height:1.45;
    text-transform:uppercase; letter-spacing:.02em; color:#fff;
    background:var(--red); padding:.6rem .75rem; }
  li.cue::before{ display:none; }
  li.back-cue{ background:var(--blue); }

  .term{ font-family:var(--mono); font-size:.85em; background:var(--tag-bg);
    padding:.06rem .3rem; border-radius:2px; }

  @media print{
    body{ background:#fff; padding:1rem; }
    .note{ break-inside:avoid; }
    li.cue{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="intro">
    <h1>Presenter notes — NTM website rebuild</h1>
    <p>One note per slide, in order. Scroll as you go. Share only the Firefox window; keep this page on your own screen.</p>
    <p class="keys">Green = stay on the slide · Red = go to the live site · Blue = back in the deck.</p>
  </div>
  <div id="notes"></div>
</div>

<script>
/* Each entry = one slide in slides.html, in order.
   head   = the section label (matches the deck)
   screen = the headline the room is reading
   status = stay | go | back
   say    = bullets. Classes: (default) point · quote · cue (red action) ·
            back-cue (blue action) · dim (optional/backup)                 */
const NOTES = [
  {
    head: "Title",
    status: "stay",
    screen: "Built to guide buyers from first look to confident purchase.",
    say: [
      { t: "Open calm and direct. One sentence: this is a tour of the rebuilt New Tech Machinery site, organized around the <span class='term'>buyer's journey</span>." },
      { t: "Frame the goal: it guides people from first look to a confident purchase." },
      { t: "Don't apologize, don't hedge, don't say \"it's not finished.\" You're showing strong work.", c: "dim" },
      { t: "Today I'm after two things: is the direction right, and look how far it's come.", c: "quote" }
    ]
  },
  {
    head: "The problem",
    status: "stay",
    screen: "The old site got in the buyer's way. (4 boxes: Navigation · Finding content · Look & feel · Mobile)",
    say: [
      { t: "THIS is the money slide. If they remember one thing, make it this. Stay here and let it breathe." },
      { t: "Four real problems with the old site — walk the boxes, name each plainly:" },
      { t: "1 · <span class='term'>Navigation</span> — built like our org chart (Machines, Resources, Learning Center). Buyers don't think in our categories, they think in what they're trying to do." },
      { t: "2 · <span class='term'>Finding content</span> — no fast way to land on a machine, a manual, or a price. Nav didn't map to intent and search barely helped, so people gave up or called." },
      { t: "3 · <span class='term'>Look &amp; feel</span> — crowded, dense, too many competing colors. An older feel that didn't look like the industry leaders we are." },
      { t: "4 · <span class='term'>Mobile</span> — split behavior: owners look up manuals and support on their phones, while buyers and education-content readers are on desktop. The old site served neither well." },
      { t: "Tie it together: the site was organized around us, not the buyer, so people got lost before they ever got to a quote.", c: "quote" },
      { t: "Every one of these has a fix later in the deck — this slide sets up everything that follows.", c: "dim" }
    ]
  },
  {
    head: "The big idea",
    status: "stay",
    screen: "Four labels. Four moments in the buyer's journey. (shown as a left-to-right path)",
    say: [
      { t: "This is the answer to problem #1: the nav is now the buyer's path, not our catalog." },
      { t: "Four nav labels = four <span class='term'>buyer states</span>, one journey: aware → consider → decide → own." },
      { t: "New to Rollforming? · Choose Your Machine · How to Buy · Get Owner Support." },
      { t: "Name it: this was Thad's original vision. The whole site is built on this spine." },
      { t: "Every page hangs off one of these four moments. Nothing is orphaned.", c: "dim" }
    ]
  },
  {
    head: "Solving it · Finding content",
    status: "stay",
    screen: "Find anything, on any screen, in seconds.",
    say: [
      { t: "This is the payoff to problems 1 & 2: navigation and findability, together." },
      { t: "<span class='term'>Navigation by intent</span> — the four buyer questions, not our catalog. The mega-menu shows machine cards (Thad asked for that)." },
      { t: "<span class='term'>Live header search</span> — top-5 results, filtered by type. \"Find a manual in two seconds.\"" },
      { t: "<span class='term'>Same map on mobile</span> — one mental model, built for a thumb in the field. Owners look things up on a phone; buyers and learners are on desktop." },
      { t: "Underneath it all: one <span class='term'>data layer</span> so specs, pricing, and finance always match.", c: "dim" }
    ]
  },
  {
    head: "The look &amp; feel",
    status: "stay",
    screen: "A look that says industry leader, not catalog vendor.",
    say: [
      { t: "This closes problem 3: the dated, crowded look. The goal here is to look the part." },
      { t: "The real message: NTM is the <span class='term'>industry leader</span> and the tech innovator in this category. The design should convey that before anyone reads a word." },
      { t: "How: <span class='term'>sharp corners</span> (built like the machines), one disciplined palette, a <span class='term'>mono typeface</span> that tags the spec data, real machine photos (not stock, not AI)." },
      { t: "Per Thad: the room won't argue the look itself — they'll ask \"is there strategy here?\" Show the strategy, don't defend taste." },
      { t: "We're at the forefront of this industry. The site should feel like it.", c: "quote" }
    ]
  },
  {
    head: "The relationship · StoryBrand / Endless Customers",
    status: "stay",
    screen: "You're not just buying a machine. You're buying the people who build it.",
    say: [
      { t: "This is the emotional core — slow down and land it. Read the headline out loud." },
      { t: "<span class='term'>StoryBrand</span> frame: the contractor is the hero, we're the guide who hands them a plan and stands behind it. We didn't bolt it on — it's how the copy is already written." },
      { t: "The marketing message leadership cares about: buying an NTM machine isn't a transaction. It's <span class='term'>experience, reliability, longevity, support</span> — the people who engineered it." },
      { t: "You're not just buying a machine. You're buying the people who build it.", c: "quote" },
      { t: "Don't name a parent company on this slide — NTM split off from Mazzella; keep it about NTM's own people.", c: "dim" }
    ]
  },
  {
    head: "Feature · Finance Center",
    status: "stay",
    screen: "Financing was a black hole. Now it's a guided router.",
    say: [
      { t: "Thad's words: the old finance page was \"a black hole\" — two paragraphs and a contact form." },
      { t: "Now it's a <span class='term'>router</span> — every honest way to pay, in one place." },
      { t: "Four paths: Apply with Corbel (soft credit pull, decision in 4–8 hrs) · Section 179 tax deduction · compare bank lenders · or bring your own bank." },
      { t: "Honest by design: we even tell them to use their own lender. We're a <span class='term'>guide, not a lender</span> — there's a disclaimer." },
      { t: "Optional: switch to the live Finance Center now, or save it for the demo run.", c: "dim" }
    ]
  },
  {
    head: "The strategy · Two paths to a quote",
    status: "stay",
    screen: "Guide the buyer who's exploring. Get out of the way of the one who's ready.",
    say: [
      { t: "This is THE buying strategy — say it clearly, it's the thing leadership cares about." },
      { t: "<span class='term'>Guided</span> (most buyers): guide them to the right machine page, educate with specs/profiles/proof, then ask for a Quote or to Contact a specialist." },
      { t: "KEY POINT, deliberately: we did NOT dump the configurator on the homepage. Someone who doesn't know what they want builds the wrong machine and makes a bad-fit quote." },
      { t: "<span class='term'>Direct</span> (the ready buyer): if they already know the machine, there's a straight path to the configurator — build, price, apply." },
      { t: "Two doors, one destination: a real, qualified quote.", c: "quote" },
      { t: "Thad's line: fewer quotes, but far better-qualified ones. Already shipped.", c: "dim" }
    ]
  },
  {
    head: "Feature · Owner support",
    status: "stay",
    screen: "The relationship doesn't end at the sale.",
    say: [
      { t: "This is the partnership made concrete — the \"we back you for the life of the machine\" promise, shipped." },
      { t: "<span class='term'>Service Hub</span> — content-first owner support: pick a machine, get its manuals, firmware, troubleshooting, training in one place." },
      { t: "<span class='term'>Learning Center</span> — the educational engine that feeds the top of the funnel." },
      { t: "Content-first means owners self-serve instead of waiting on a call.", c: "dim" },
      { t: "LAST SLIDE BEFORE THE DEMO. Finish your point, then hit next in the deck — a red banner appears. That's your signal to switch to Firefox tab 2 (live site).", c: "cue" }
    ]
  },
  {
    head: "— Live demo (in Firefox) —",
    status: "go",
    screen: "Switch to the live site. Run the click-path. End on the homepage.",
    say: [
      { t: "Go to Firefox tab 2 (live site). Drive the site, not this page.", c: "cue" },
      { t: "1 · Homepage hero — \"notice it talks to YOU, the contractor, about YOUR margin — not about us.\"" },
      { t: "2 · Open the mega-menu, switch panels slowly — \"watch one panel close before the next opens. That's the premium feel.\"" },
      { t: "3 · Walk the four labels — \"not product categories. The four questions every buyer asks.\"" },
      { t: "4 · Header search — type a query — \"find a manual in two seconds.\"" },
      { t: "5 · How to Buy → Finance Center — tour the four paths — \"every way to pay, honestly, even your own bank.\"" },
      { t: "6 · Build · Quote · Finance — open the configurator — \"no call-for-pricing. A real number, instantly.\"" },
      { t: "7 · Resize to mobile / pull out your phone — swipe the menu — \"mobile-first, because the buyer is in a truck.\" (biggest wow)" },
      { t: "8 · A machine page → Service Hub — finance CTA, specs, owner support — close the loop back to the journey." },
      { t: "End on the homepage, then switch back to Firefox tab 1 (the deck) for the close.", c: "back-cue" }
    ]
  },
  {
    head: "The ask",
    status: "back",
    screen: "Two questions, and what comes next.",
    say: [
      { t: "Back in the deck (Firefox tab 1). You're done with the live site — stay in the deck through the close.", c: "back-cue" },
      { t: "Two asks, soft. (1) Tell me the direction is right. (2) Here's what's left and what I need from you." },
      { t: "Go-live target: <span class='term'>first week of July</span>." },
      { t: "The real gates aren't code — they're: Rick's content review, team training, and a short content-freeze at launch for migration + redirects." },
      { t: "Training plan: a live session + a recorded video. Sales via their Friday tacticals, service via the managers' call. Rick helps schedule." },
      { t: "Ask of the room: keep the team continually aware July 1 is coming.", c: "quote" }
    ]
  },
  {
    head: "What's next · Phase 2 & beyond",
    status: "stay",
    screen: "The launch is the foundation. Here's where it goes.",
    say: [
      { t: "Lead with: the site we're launching is the foundation. This is the roadmap behind it." },
      { t: "These are <span class='term'>explorations, not commitments</span> — say that out loud. No dates you can't keep." },
      { t: "Sharpen buying: a compare tool, plus promo banners (\"0% financing\" in the mega-menu)." },
      { t: "Deepen ownership: parts e-commerce, and direct service requests into NetSuite (gated on keeping source tracking)." },
      { t: "Future platform: a \"Sally\" support bot, and eventually a mobile app." },
      { t: "If someone gets excited about one: \"Great — it's on the list. Let's prioritize it after launch.\"", c: "quote" }
    ]
  },
  {
    head: "Q&A safety net — read if pressed",
    status: "stay",
    screen: "Crisp answers to the hard questions. Don't bluff — de-risk.",
    say: [
      { t: "Rollback? It's a theme — a code rollback, not a rebuild. Old site is saved. But day-to-day we fix the specific thing, not revert everything." },
      { t: "SEO / broken links? No — existing URLs all stay live. We ADDED structured data (Product + FAQ schema) and fixed meta hygiene. More SEO surface, not less." },
      { t: "Why bury the configurator? Bottom-of-funnel tool. On the homepage it makes bad-fit quotes. Fewer, better-qualified quotes." },
      { t: "Confuse existing customers? Same four labels phone + desktop, bookmarks still work. And it's launched, not theoretical — GA + Microsoft Clarity let us watch and tune daily." },
      { t: "ROI / why change? Old finance page was a black hole; configurator kills the \"call for pricing\" stall and pre-qualifies buyers." },
      { t: "Cost / timeline? ~75–80% done. What's left is content, training, migration — not core dev. I'm the developer, no external cost." },
      { t: "Finance wrong / legal? Accuracy review with Kathy + Terry before go-live. Page says NTM is a guide, not a lender." },
      { t: "Who maintains it? I do — sole dev, so same-week fixes. Bus factor is real, which is why everything's documented.", c: "dim" },
      { t: "Curveball you didn't prep: \"Good question — I don't have that number in front of me; I'll get it to you by [day].\" Then redirect to direction.", c: "cue" },
      { t: "The 10→4 quote figure is anecdotal — present it as a hunch, not data.", c: "dim" }
    ]
  }
];

const TAG_LABEL = { stay: "Stay on slide", go: "Go to live site", back: "Back in deck" };

document.getElementById('notes').innerHTML = NOTES.map((note, idx) => {
  const st = note.status || "stay";
  const bullets = note.say.map(b => {
    const cls = b.c ? ' class="' + b.c + '"' : '';
    return '<li' + cls + '>' + b.t + '</li>';
  }).join('');
  return '<section class="note">'
    + '<div class="num">' + String(idx + 1).padStart(2, '0') + ' / ' + NOTES.length + '</div>'
    + '<div class="head">' + note.head + '</div>'
    + '<div class="screen">' + note.screen + '</div>'
    + '<span class="tag ' + st + '">' + TAG_LABEL[st] + '</span>'
    + '<ul>' + bullets + '</ul>'
    + '</section>';
}).join('');
</script>
</body>
</html>
